<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
</head>
<body>
    <nav>
        <div class="logo">
            <img src="https://pngimg.com/uploads/squid_game/squid_game_PNG35.png" alt="" srcset="">
        </div>
        <div class="midsection">
            <p>About</p>
            <p>Watch now</p>
            <p>Actors</p>
            <p>Contact</p>
        </div>
        <div class="icon"><i class="ri-menu-3-fill"></i></div>

    </nav>
    <main>
        <section class="left">
            <div class="image">
                <img src="./images/squidgame.png" alt="">
            </div>
            <p>Action / Thriller / Drama Series directed by Dong-hyuk Hwang<br>
               Season 1:9 Episodes
            </p>
            <div class="buttons">
                <button><i class="ri-play-circle-fill"></i> Play Now</button>
                <button><i class="ri-play-circle-fill"></i> Watch Trailer</button>
            </div>
        </section>
        <h3 class="special"><span style="color:crimson">----------</span>SCROLL</h3>
         <section class="right">
            <div class="image">
                <img src="./images/squidman.png" alt="">
            </div>
            <div class="social">
                <i class="ri-twitter-line"></i>
                <i class="ri-instagram-line"></i>
                <i class="ri-facebook-line"></i>
            </div>
         </section>
    </main>
    <footer>
        <div class="box">
            <img src="./images/pos1.jpeg" alt="">
            <div class="ico"><i class="ri-play-circle-fill"></i></div>
        </div>
        <div class="box">
             <img src="./images/pos2.jpeg" alt="">
             <div class="ico"><i class="ri-play-circle-fill"></i></div>

        </div>
        <div class="box">
             <img src="./images/pos3.jpeg" alt="">
             <div class="ico"><i class="ri-play-circle-fill"></i></div>

        </div>
    </footer>

    
</body>
</html>
